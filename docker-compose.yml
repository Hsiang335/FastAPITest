services:

  db:
    image: postgres:16

    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # ⭐ 新增：健康檢查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .

    container_name: fastapi_app

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy   # ⭐ 關鍵修正


    volumes:
      - .:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload


volumes:
  postgres_data:
